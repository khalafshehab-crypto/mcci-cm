<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام إدارة اللجان - نسخة V4</title>
  </head>
  <body>
    <script>
      window.onerror = function(msg) {
        if (msg && typeof msg === 'string' && (msg.toLowerCase().includes('script error') || msg.toLowerCase().includes('resizeobserver'))) {
          return true;
        }
        return false;
      };
      window.addEventListener('error', function(e) {
        const msg = e.message || '';
        if (msg && typeof msg === 'string' && (msg.toLowerCase().includes('script error') || msg.toLowerCase().includes('resizeobserver'))) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();
          return true;
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        // Suppress benign unhandled rejections if needed
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" crossorigin="anonymous"></script>
  </body>
</html>
